name: Daily Repository Update

on:
  schedule:
    - cron: '15 9 * * *'   # Runs daily at 09:15 UTC (specific time)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Step for 23f3002156@ds.study.iitm.ac.in
        run: echo "Running scheduled update"

      - name: Make daily commit
        run: |
          echo "Last updated on $(date)" >> daily-log.txt
          git config user.name "github-actions[bot]"
          git config user.email "23f3002156@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Automated daily update" || echo "No changes to commit"
          git push
