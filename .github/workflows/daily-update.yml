name: Daily Repository Update

on:
  schedule:
    - cron: '30 8 * * *'   # Runs daily at 08:30 UTC (specific time)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Step for 23f3002156@ds.study.iitm.ac.in
        run: echo "Daily automation running"

      - name: Make daily commit
        run: |
          echo "Last updated on $(date)" >> daily-log.txt
          git config user.name "github-actions[bot]"
          git config user.email "23f3002156@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Automated daily update"
          git push
